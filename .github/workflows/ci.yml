name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test

  validate:
    name: homey app validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Use the official Athom CLI image. `validate` runs against the
      # checked-in app.json and friends — no Homey hardware required.
      - name: Install Homey CLI
        run: npm install -g homey
      - name: Validate
        run: homey app validate --level publish
