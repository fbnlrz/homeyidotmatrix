<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Driver Icon: Representing a pixel display frame -->
  <g fill="none" stroke="#ff3366" stroke-width="12">
    <rect x="30" y="30" width="196" height="196" rx="10"/>
  </g>
  <g fill="#ff3366">
    <!-- A 3x3 pixel grid in the center -->
    <rect x="70" y="70" width="30" height="30" rx="4"/>
    <rect x="113" y="70" width="30" height="30" rx="4"/>
    <rect x="156" y="70" width="30" height="30" rx="4"/>

    <rect x="70" y="113" width="30" height="30" rx="4"/>
    <rect x="113" y="113" width="30" height="30" rx="4"/>
    <rect x="156" y="113" width="30" height="30" rx="4"/>

    <rect x="70" y="156" width="30" height="30" rx="4"/>
    <rect x="113" y="156" width="30" height="30" rx="4"/>
    <rect x="156" y="156" width="30" height="30" rx="4"/>
  </g>
</svg>
