<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- iDotMatrix display panel: framed LED grid on a small stand.
       Distinct from the app icon (pixel-heart outline). -->
  <g fill="none" stroke="#ff3366" stroke-width="44">
    <rect x="140" y="110" width="680" height="680" rx="64"/>
  </g>
  <g fill="#ff3366">
    <!-- 3x3 LED grid -->
    <rect x="230" y="210" width="120" height="120" rx="26"/>
    <rect x="420" y="210" width="120" height="120" rx="26"/>
    <rect x="610" y="210" width="120" height="120" rx="26"/>
    <rect x="230" y="400" width="120" height="120" rx="26"/>
    <rect x="420" y="400" width="120" height="120" rx="26"/>
    <rect x="610" y="400" width="120" height="120" rx="26"/>
    <rect x="230" y="590" width="120" height="120" rx="26"/>
    <rect x="420" y="590" width="120" height="120" rx="26"/>
    <rect x="610" y="590" width="120" height="120" rx="26"/>
    <!-- stand feet -->
    <rect x="230" y="826" width="150" height="56" rx="22"/>
    <rect x="580" y="826" width="150" height="56" rx="22"/>
  </g>
</svg>
